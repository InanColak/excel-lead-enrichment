services:
  api:
    build:
      context: .
      target: development
    volumes:
      - ./app:/app/app
      - ./data/uploads:/data/uploads
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
      - ./scripts:/app/scripts
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://leadenrich:${DB_PASSWORD}@db:5432/leadenrich
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    command: bash /app/scripts/dev-entrypoint.sh

  worker:
    build:
      context: .
      target: development
    volumes:
      - ./app:/app/app
      - ./data/uploads:/data/uploads
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic
